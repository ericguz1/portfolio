<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eric Guzman — Security Portfolio</title>
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEME VARIABLES ── */
    :root, [data-theme="light"] {
      --bg:          #ffffff;
      --bg-hover:    #fafafa;
      --text:        #1a1a1a;
      --text-muted:  #555;
      --text-dim:    #999;
      --text-dimmer: #bbb;
      --border:      #e5e5e5;
      --border-row:  #f2f2f2;
      --link:        #0060c0;
      --heading-sub: #444;
      --skill-head:  #333;
      --toggle-bg:   #f0f0f0;
      --toggle-fg:   #333;
    }

    [data-theme="dark"] {
      --bg:          #111214;
      --bg-hover:    #1a1c1f;
      --text:        #dde6ed;
      --text-muted:  #8fa3ae;
      --text-dim:    #5a7280;
      --text-dimmer: #3d5464;
      --border:      #1e2830;
      --border-row:  #161b20;
      --link:        #5ba8f0;
      --heading-sub: #9eb8c4;
      --skill-head:  #c8dde8;
      --toggle-bg:   #1e2830;
      --toggle-fg:   #8fa3ae;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.75rem 5rem;
      transition: background 0.15s, color 0.15s;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .back-link {
      font-size: 12px;
      color: var(--text-dim);
    }
    .back-link a { color: var(--link); }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      font-size: 11px;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--toggle-bg);
      color: var(--toggle-fg);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .theme-toggle:hover { opacity: 0.8; }

    /* ── HEADER ── */
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.2rem; }
    .role     { font-size: 1rem;      color: var(--heading-sub); margin-bottom: 0.2rem; }
    .location { font-size: 0.8125rem; color: var(--text-dim);    margin-bottom: 1.25rem; }

    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 1.5rem;
      font-size: 13px;
      margin-bottom: 1.75rem;
    }

    .bio {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 72ch;
      padding-bottom: 2.5rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── SECTIONS ── */
    section { margin-bottom: 2.75rem; }

    h2 {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      padding-bottom: 0.5rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── CERTIFICATIONS ── */
    .cert { margin-bottom: 1.5rem; }
    .cert:last-child { margin-bottom: 0; }

    .cert-status {
      font-size: 11px;
      color: var(--text-dimmer);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.15rem;
    }

    .cert-name {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .cert-desc    { font-size: 13px; color: var(--text-muted); margin-bottom: 0.4rem; max-width: 68ch; }
    .cert-actions { display: flex; gap: 1rem; font-size: 12.5px; }
    .cert-pending { font-size: 12px; color: var(--text-dimmer); font-style: italic; }

    /* ── SKILLS ── */
    .skill-group { margin-bottom: 1rem; }
    .skill-group:last-child { margin-bottom: 0; }

    .skill-heading { font-size: 12px; font-weight: 600; color: var(--skill-head); margin-bottom: 0.2rem; }
    .skill-text    { font-size: 13px; color: var(--text-muted); }

    /* ── PROJECTS TABLE ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    th {
      text-align: left;
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-dimmer);
      padding: 0.35rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.65rem 0.75rem;
      vertical-align: top;
      border-bottom: 1px solid var(--border-row);
    }

    tr:hover td { background: var(--bg-hover); }

    .proj-title { font-weight: 500; color: var(--text);       margin-bottom: 0.2rem; }
    .proj-stack { font-size: 12px;  color: var(--text-dim); }
    .proj-desc  { font-size: 12px;  color: var(--text-muted); }
    .pdf-link   { font-size: 12px;  color: var(--link); white-space: nowrap; }

    /* ── ALL LABS (collapsible) ── */
    details { margin-top: 1.5rem; }
    details summary {
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::before       { content: '▶'; font-size: 8px; }
    details[open] summary::before { content: '▼'; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dimmer);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .footer a       { color: var(--text-dim); }
    .footer a:hover { color: var(--text); text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      body { padding: 1.5rem 1rem 4rem; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      td { padding: 0.25rem 0; border: none; }
      tr { margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="back-link">← <a href="index.html">Full interactive site</a></span>
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">☀ Light mode</button>
  </div>

  <div id="hero-wrap"></div>

  <section>
    <h2>Certifications</h2>
    <div id="certs-wrap"></div>
  </section>

  <section>
    <h2>Skills</h2>
    <div id="skills-wrap"></div>
  </section>

  <section>
    <h2>Featured Projects</h2>
    <table>
      <thead>
        <tr>
          <th style="width:38%">Project</th>
          <th>Description</th>
          <th style="width:90px">Write-Up</th>
        </tr>
      </thead>
      <tbody id="projects-featured"></tbody>
    </table>

    <details>
      <summary>All Labs &amp; Research</summary>
      <table>
        <thead>
          <tr>
            <th style="width:38%">Project</th>
            <th>Stack</th>
            <th style="width:90px">Write-Up</th>
          </tr>
        </thead>
        <tbody id="projects-labs"></tbody>
      </table>
    </details>
  </section>

  <footer class="footer">
    <span>2026</span>
    <span>
      <a href="https://github.com/ericguz1" target="_blank">GitHub</a>
      &nbsp;&middot;&nbsp;
      <a href="http://www.linkedin.com/in/eric-guzman-99722a351" target="_blank">LinkedIn</a>
    </span>
  </footer>

<script>
// ── THEME TOGGLE ──
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '☀ Light mode' : '☾ Dark mode';
  localStorage.setItem('simple-theme', next);
}

// Restore saved preference (defaults to dark if nothing saved)
(function(){
  const saved = localStorage.getItem('simple-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀ Light mode' : '☾ Dark mode';
})();

// ── HERO ──
document.getElementById('hero-wrap').innerHTML = `
  <h1>${HERO.name}</h1>
  <p class="role">${HERO.role}</p>
  <p class="location">${HERO.location} &bull; ${HERO.university} &bull; ${HERO.degree}</p>
  <div class="contact">
    ${HERO.links.map(l => `<a href="${l.href}">${l.label}</a>`).join('')}
  </div>
  <p class="bio">${HERO.bio}</p>
`;

// ── CERTIFICATIONS ──
document.getElementById('certs-wrap').innerHTML = CERTS.map(c => `
  <div class="cert">
    <div class="cert-status">${c.badge}</div>
    <div class="cert-name">${c.title}</div>
    <p class="cert-desc">${c.desc}</p>
    ${c.pending
      ? `<span class="cert-pending">In progress</span>`
      : `<div class="cert-actions">
           ${c.actions.map(a => `<a href="${a.href}" target="_blank">${a.label} →</a>`).join('')}
         </div>`
    }
  </div>
`).join('');

// ── SKILLS ──
document.getElementById('skills-wrap').innerHTML = SKILLS_FULL.map(s => `
  <div class="skill-group">
    <div class="skill-heading">${s.heading}</div>
    <div class="skill-text">${s.text}</div>
  </div>
`).join('');

// ── PROJECTS ──
function projRow(p) {
  return `
    <tr>
      <td>
        <div class="proj-title">${p.title}</div>
        <div class="proj-stack">${p.stack}</div>
      </td>
      <td class="proj-desc">${p.desc}</td>
      <td><a class="pdf-link" href="${p.pdf}" target="_blank">View PDF →</a></td>
    </tr>`;
}

document.getElementById('projects-featured').innerHTML = PROJECTS.featured.map(projRow).join('');
document.getElementById('projects-labs').innerHTML     = PROJECTS.labs.map(projRow).join('');
</script>

</body>
</html>
